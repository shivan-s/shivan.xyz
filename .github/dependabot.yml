# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: daily
    groups:
      patch-updates:
        patterns:
          - '*'
        update-types:
          - patch
  - package-ecosystem: github-actions
    directory: '/.github'
    schedule:
      interval: weekly
