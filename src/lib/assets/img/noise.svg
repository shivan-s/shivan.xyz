<svg 
  viewBox="0 0 1600 900"
  xmlns='http://www.w3.org/2000/svg'>
  <filter id='noiseFilter'>
    <feTurbulence 
      type='fractalNoise' 
      baseFrequency='1' 
      numOctaves='3' 
      stitchTiles='stitch' />
  </filter>
  <rect
    opacity='0.3'
    width='100%' 
    height='100%' 
    filter='url(#noiseFilter)' />
</svg>
